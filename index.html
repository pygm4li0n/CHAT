<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Chat – Supabase</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f2f5;
    }
    .chat-container {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      height: 80vh;
      margin: 20px;
    }
    .chat-header {
      padding: 16px;
      background: #7c3aed;
      color: white;
      border-radius: 12px 12px 0 0;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      font-weight: 400;
      background: rgba(255,255,255,0.2);
      padding: 4px 10px;
      border-radius: 20px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffc107;
    }
    .status-dot.connected { background: #4ade80; }
    .status-dot.disconnected { background: #ef4444; }
    .error-banner {
      background: #fee2e2;
      color: #b91c1c;
      padding: 8px 16px;
      font-size: 0.8rem;
      display: none;
      word-break: break-word;
    }
    .error-banner.visible { display: block; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      background: #f1f0ff;
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 80%;
      align-self: flex-start;
    }
    .message .user {
      font-weight: bold;
      color: #7c3aed;
      margin-bottom: 4px;
      font-size: 0.85rem;
    }
    .message .text {
      font-size: 0.95rem;
      color: #1a1a2e;
    }
    .empty-messages {
      text-align: center;
      color: #9ca3af;
      margin-top: 40px;
      font-style: italic;
    }
    .input-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #e0e0e0;
    }
    #username {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    #messageInput {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    button {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #6d28d9; }
    button:disabled { background: #b9a5e7; cursor: not-allowed; }
    .tip-box {
      background: #fef3c7;
      color: #92400e;
      padding: 12px 16px;
      font-size: 0.85rem;
      text-align: center;
      border-bottom: 1px solid #fcd34d;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <span>💬 Live Chat</span>
      <div class="status" id="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Connecting…</span>
      </div>
    </div>
    <div class="tip-box" id="tipBox" style="display:none;">
      💡 Open this file via <strong>http://</strong> instead of <strong>file://</strong> – use a local server (see instructions below)
    </div>
    <div class="error-banner" id="errorBanner"></div>
    <div class="messages" id="messages">
      <div class="empty-messages" id="emptyHint">No messages yet. Be the first to say hi 👋</div>
    </div>
    <div class="input-area">
      <input type="text" id="username" placeholder="Your name" maxlength="30" autocomplete="off">
      <div class="input-row">
        <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500" autocomplete="off">
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      // ---------- YOUR SUPABASE PROJECT ----------
      const SUPABASE_URL = 'https://uixcwhznmoaqabhmrdhu.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_c1LTwDYysAf8pWP-gkiPmQ_uIZivJD_';

      // Warn if opened via file://
      if (window.location.protocol === 'file:') {
        document.getElementById('tipBox').style.display = 'block';
      }

      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const messagesDiv = document.getElementById('messages');
      const usernameInput = document.getElementById('username');
      const messageInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const errorBanner = document.getElementById('errorBanner');
      const emptyHint = document.getElementById('emptyHint');

      // ---- Status helpers ----
      function setStatus(state, text) {
        statusDot.className = 'status-dot ' + (state || '');
        statusText.textContent = text;
      }

      function showError(msg) {
        errorBanner.textContent = '⚠️ ' + msg;
        errorBanner.classList.add('visible');
      }

      function clearError() {
        errorBanner.classList.remove('visible');
      }

      // ---- Username ----
      const STORAGE_KEY = 'chat_username';
      usernameInput.value = localStorage.getItem(STORAGE_KEY) || '';
      usernameInput.addEventListener('input', () => {
        localStorage.setItem(STORAGE_KEY, usernameInput.value);
      });

      function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return String(text).replace(/[&<>"']/g, m => map[m]);
      }

      function addMessage({ username, message }) {
        if (emptyHint) emptyHint.style.display = 'none';
        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `<div class="user">${escapeHtml(username)}</div>
                         <div class="text">${escapeHtml(message)}</div>`;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      // ---- Load messages with timeout ----
      async function loadMessages() {
        // Create a timeout that rejects after 8 seconds
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);

        try {
          setStatus('', 'Connecting…');
          clearError();

          // Use fetch directly so we can catch abort/timeout properly
          const response = await fetch(
            `${SUPABASE_URL}/rest/v1/messages?select=*&order=created_at.asc&limit=50`,
            {
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
              },
              signal: controller.signal
            }
          );
          clearTimeout(timeoutId);

          if (!response.ok) {
            const errText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errText}`);
          }

          const data = await response.json();
          messagesDiv.innerHTML = '';
          if (data.length === 0) {
            messagesDiv.innerHTML = '<div class="empty-messages" id="emptyHint">No messages yet. Be the first to say hi 👋</div>';
          } else {
            data.forEach(msg => addMessage(msg));
          }
          setStatus('connected', 'Live');
          return true;
        } catch (err) {
          clearTimeout(timeoutId);
          if (err.name === 'AbortError') {
            showError('Request timed out. Check your network and Supabase project status.');
          } else {
            showError('Failed to load: ' + err.message);
          }
          setStatus('disconnected', 'Error');
          return false;
        }
      }

      // ---- Send message (with timeout) ----
      async function sendMessage() {
        const username = usernameInput.value.trim();
        const message = messageInput.value.trim();
        if (!username || !message) return;

        sendBtn.disabled = true;
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        try {
          const response = await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
            method: 'POST',
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ username, message }),
            signal: controller.signal
          });
          clearTimeout(timeoutId);

          if (!response.ok) {
            const errText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errText}`);
          }

          messageInput.value = '';
          clearError();
          // The realtime subscription will display the new message
        } catch (err) {
          if (err.name === 'AbortError') {
            showError('Send timed out. Check your connection.');
          } else {
            showError('Send failed: ' + err.message);
          }
          setStatus('disconnected', 'Error');
        } finally {
          sendBtn.disabled = false;
          messageInput.focus();
        }
      }

      // ---- Realtime subscription ----
      let channel;
      function subscribeToRealtime() {
        channel = supabase
          .channel('public:messages')
          .on(
            'postgres_changes',
            { event: 'INSERT', schema: 'public', table: 'messages' },
            (payload) => {
              addMessage(payload.new);
              setStatus('connected', 'Live');
              clearError();
            }
          )
          .subscribe((status) => {
            if (status === 'SUBSCRIBED') {
              setStatus('connected', 'Live');
            } else if (status === 'CHANNEL_ERROR') {
              showError('Realtime connection failed. Is the messages table in the publication?');
              setStatus('disconnected', 'Realtime error');
            } else if (status === 'CLOSED') {
              setStatus('disconnected', 'Disconnected');
            }
          });
      }

      // ---- Event listeners ----
      sendBtn.addEventListener('click', sendMessage);
      messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
      });

      // ---- Start ----
      setStatus('', 'Connecting…');
      loadMessages().then((tableOk) => {
        subscribeToRealtime();
      });
    })();
  </script>
</body>
</html>
